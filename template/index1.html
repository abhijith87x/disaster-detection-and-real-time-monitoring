<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real time disaster verification and mapping</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/style1.css">
</head>
<body>
    <div class="main-body">

        <div class="image">
            <div class="tile" style="--bg:#16213e"><i class="ti ti-map"></i><span>MAP</span></div>
            <div class="tile" style="--bg:#0f3460"><i class="ti ti-satellite"></i><span>LIVE</span></div>
            <div class="tile" style="--bg:#1a1a2e"><i class="ti ti-alert-circle"></i><span>ALERT</span></div>
            <div class="tile" style="--bg:#0f3460"><i class="ti ti-camera"></i><span>REPORT</span></div>
            <div class="tile" style="--bg:#16213e"><i class="ti ti-shield-check"></i><span>VERIFY</span></div>
            <div class="tile" style="--bg:#1a1a2e"><i class="ti ti-users"></i><span>UNITE</span></div>
            <div class="tile" style="--bg:#e94560"><i class="ti ti-send"></i><span>SEND</span></div>
        </div>

        <div class="navbar">
            <div class="nav-left">
                <i class="ti ti-radar"></i>
                <span class="app-title">DisasterWatch</span>
            </div>
            <!-- <div class="nav-right">
                <a href="/upload-form" class="btn-demo">Demo</a>
                <button class="btn-login" onclick="window.location.href='/login-page'">Login / Signup</button>
            </div> -->
            <div class="nav-right">
                <a href="/upload-form" class="btn-demo">Demo</a>

                <div id="auth-section">
                    <button class="btn-login"
                        onclick="window.location.href='/login-page'">
                        Login / Signup
                     </button>
                </div>
            </div>
        </div>

        <div class="section-header">
            <span class="section-title">Recent Disasters</span>
            <span class="section-badge">Live feed</span>
        </div>

        <div class="cards-grid" id="disaster-feed">
        </div>

        <div class="camera-fab">
            <a href="/input-camera" class="fab" aria-label="Upload disaster image">
                <i class="ti ti-camera"></i>
            </a>
        </div>

    </div>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
    <script src="/static/script.js"></script>

    <script>
        window.addEventListener("pageshow" ,() =>{
            profile_update();
            loadReports();
        });
    </script>
</body>
</html>

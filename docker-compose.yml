services:
  mysql:
    image: mysql:8
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root87141
      MYSQL_DATABASE: disaster_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    container_name: redis-container
    restart: always
    ports:
      - "6379:6379"
  backend:
    image: abhijith87b/disaster-api:latest
    container_name: disaster-api
    restart: always
    volumes:
      - ./ml/multi-Disaster_detector3.h5:/app/ml/multi-Disaster_detector3.h5
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root87141
      DB_NAME: disaster_db
      REDIS_HOST: redis
volumes:
  mysql_data: